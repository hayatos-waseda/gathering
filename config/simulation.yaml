max_step: 10000
seed: 42

agents:
  - name: playerA1
    team: A
    type: AgentA
    start_pos: [0, 0]

  - name: playerA2
    team: A
    type: AgentA
    start_pos: [6, 0]

  - name: playerB1
    team: B
    type: AgentB
    start_pos: [0, 6]

  - name: playerB2
    team: B
    type: AgentB
    start_pos: [6, 6]

render:
  mode: gif
  output: results.gif

environment:
  map_path: config/map.txt
  event:
    p_set: [0.05, 0.01, 0.001]
    p_distribution: [0.125, 0.5, 0.375]